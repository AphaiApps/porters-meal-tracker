<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porter's Meal Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --nick-green: #166534; 
            --sam-blue-teal: #0d9488; 
            --evie-pink: #f472b6; 
        }

        #btn-Nick { background-color: var(--nick-green); color: white; border-color: var(--nick-green); }
        #btn-Sam { background-color: var(--sam-blue-teal); color: white; border-color: var(--sam-blue-teal); }
        #btn-Evie { background-color: var(--evie-pink); color: white; border-color: var(--evie-pink); }

        .meal-btn:active, .status-btn:active, .fed-btn:active {
            transform: scale(0.95);
        }
        
        .fed-btn {
            transition: all 0.2s ease-in-out;
        }

        .fed-btn.is-selected {
            box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.9);
            transform: translateY(2px);
        }

        .is-dimmed {
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans pb-20">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 mb-4">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Porter's Meals 🐾</h1>
        
        <div id="form-container" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2 font-bold uppercase text-xs text-gray-500">Date of Meal</label>
                <input type="date" id="meal-date" class="w-full border-2 border-gray-200 rounded-lg p-3 focus:outline-none focus:border-blue-500 font-bold text-gray-700">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2 font-bold uppercase text-xs text-gray-500">Which Meal?</label>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setMeal('Breakfast')" id="btn-Breakfast" class="meal-btn border-2 py-4 rounded-lg font-bold border-gray-200 text-gray-600 transition-all">Breakfast</button>
                    <button onclick="setMeal('Dinner')" id="btn-Dinner" class="meal-btn border-2 py-4 rounded-lg font-bold border-gray-200 text-gray-600 transition-all">Dinner</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2 font-bold uppercase text-xs text-gray-500">Status</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setStatus('Ate')" id="btn-Ate" class="status-btn border-2 py-3 rounded-lg text-sm font-bold border-gray-200 text-gray-600">Ate All</button>
                    <button onclick="setStatus('Partial')" id="btn-Partial" class="status-btn border-2 py-3 rounded-lg text-sm font-bold border-gray-200 text-gray-600">Partial</button>
                    <button onclick="setStatus('Skipped')" id="btn-Skipped" class="status-btn border-2 py-3 rounded-lg text-sm font-bold border-gray-200 text-gray-600">Skipped</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2 font-bold uppercase text-xs text-gray-500">Who Fed Him?</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setFedBy('Nick')" id="btn-Nick" class="fed-btn border-2 py-3 rounded-lg text-sm font-bold shadow-sm">Nick</button>
                    <button onclick="setFedBy('Sam')" id="btn-Sam" class="fed-btn border-2 py-3 rounded-lg text-sm font-bold shadow-sm">Sam</button>
                    <button onclick="setFedBy('Evie')" id="btn-Evie" class="fed-btn border-2 py-3 rounded-lg text-sm font-bold shadow-sm">Evie</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2 font-bold text-xs uppercase text-gray-500">Notes (Optional)</label>
                <textarea id="notes" class="w-full border-2 border-gray-200 rounded-lg p-3 h-24 focus:outline-none focus:border-blue-500" placeholder="e.g. Mood, behavior..."></textarea>
            </div>

            <button onclick="submitLog()" id="submit-btn" class="w-full bg-blue-600 text-white font-black text-lg py-5 rounded-xl shadow-lg active:scale-95 transition-transform uppercase tracking-wider text-center">Log Meal</button>
            
            <div id="success-toast" class="hidden bg-green-500 text-white text-center font-bold py-3 rounded-lg animate-bounce">
                ✅ MEAL LOGGED SUCCESSFULLY!
            </div>

            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="toggleHistory()" class="w-full bg-gray-800 text-white font-bold py-3 rounded-lg text-sm">View History</button>
                <button onclick="exportData()" class="w-full border-2 border-green-600 text-green-700 font-bold py-3 rounded-lg text-sm text-center">Export CSV</button>
            </div>
        </div>

        <div id="history-container" class="hidden mt-6 space-y-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800 underline uppercase tracking-tight text-center">Recent History</h2>
                <button onclick="toggleHistory()" class="text-blue-600 font-bold text-sm uppercase">Close</button>
            </div>
            <div id="history-list" class="max-h-96 overflow-y-auto space-y-3 pr-2 text-sm"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, doc, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDH5QxUSCg8Rt9xR4_9puiTwo-ml4jKjhM",
            authDomain: "porters-meal-tracker.firebaseapp.com",
            projectId: "porters-meal-tracker",
            storageBucket: "porters-meal-tracker.firebasestorage.app",
            messagingSenderId: "578808944486",
            appId: "1:578808944486:web:cc5690461ec6ee2d7fdaa7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const dateInput = document.getElementById('meal-date');
const localDate = new Date();
const yyyy = localDate.getFullYear();
const mm = String(localDate.getMonth() + 1).padStart(2, '0');
const dd = String(localDate.getDate()).padStart(2, '0');
dateInput.value = `${yyyy}-${mm}-${dd}`;

        function formatDate(dateStr) {
            if (!dateStr || dateStr === "Unknown") return "Unknown Date";
            if (dateStr.includes('-')) {
                const [y, m, d] = dateStr.split('-');
                return `${parseInt(m)}/${parseInt(d)}/${y}`;
            }
            return dateStr;
        }

        let selectedMeal = '';
        let selectedStatus = '';
        let selectedFedBy = '';

        if (localStorage.getItem('lastFedBy')) {
            setTimeout(() => { setFedBy(localStorage.getItem('lastFedBy')); }, 100);
        }

        window.setMeal = (meal) => {
            selectedMeal = meal;
            document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600'));
            document.getElementById('btn-' + meal).classList.add('bg-blue-600', 'text-white', 'border-blue-600');
        };

        window.setStatus = (status) => {
            selectedStatus = status;
            document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('bg-green-600', 'text-white', 'border-green-600', 'bg-red-600', 'border-red-600', 'bg-yellow-500', 'border-yellow-500'));
            const btn = document.getElementById('btn-' + status);
            if(status === 'Ate') btn.classList.add('bg-green-600', 'text-white', 'border-green-600');
            if(status === 'Partial') btn.classList.add('bg-yellow-500', 'text-white', 'border-yellow-500');
            if(status === 'Skipped') btn.classList.add('bg-red-600', 'text-white', 'border-red-600');
        };

        window.setFedBy = (person) => {
            selectedFedBy = person;
            localStorage.setItem('lastFedBy', person);
            
            document.querySelectorAll('.fed-btn').forEach(b => {
                b.classList.remove('is-selected', 'is-dimmed');
            });
            
            const selectedBtn = document.getElementById('btn-' + person);
            selectedBtn.classList.add('is-selected');

            document.querySelectorAll('.fed-btn').forEach(b => {
                if(b !== selectedBtn) b.classList.add('is-dimmed');
            });
        };

        window.submitLog = async () => {
            if (!selectedMeal || !selectedStatus || !selectedFedBy) {
                alert("Select Meal, Status, and Who Fed Him!");
                return;
            }
            const btn = document.getElementById('submit-btn');
            const toast = document.getElementById('success-toast');
            btn.disabled = true;
            btn.innerText = "UPDATING...";

            const chosenDate = new Date(dateInput.value + 'T12:00:00'); 

            try {
                await addDoc(collection(db, "meals"), {
                    timestamp: Timestamp.fromDate(chosenDate),
                    displayDate: dateInput.value,
                    meal: selectedMeal,
                    status: selectedStatus,
                    fedBy: selectedFedBy,
                    notes: document.getElementById('notes').value
                });
                toast.classList.remove('hidden');
                
                selectedMeal = '';
                selectedStatus = '';
                document.getElementById('notes').value = '';
                document.querySelectorAll('.meal-btn, .status-btn').forEach(b => b.classList.remove('bg-blue-600', 'bg-green-600', 'bg-red-600', 'bg-yellow-500', 'text-white', 'border-blue-600', 'border-green-600', 'border-red-600', 'border-yellow-500'));
                setTimeout(() => { toast.classList.add('hidden'); }, 3000);
            } catch (e) {
                alert("Error saving data.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Log Meal";
            }
        };

        window.toggleHistory = async () => {
            const hist = document.getElementById('history-container');
            const form = document.getElementById('form-container');
            if (hist.classList.contains('hidden')) {
                hist.classList.remove('hidden');
                form.classList.add('hidden');
                loadHistory();
            } else {
                hist.classList.add('hidden');
                form.classList.remove('hidden');
            }
        };

        window.deleteLogItem = async (id) => {
            if (confirm("Are you sure you want to delete this meal log?")) {
                try {
                    await deleteDoc(doc(db, "meals", id));
                    loadHistory();
                } catch (e) {
                    alert("Error deleting record.");
                }
            }
        };

        async function loadHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "Loading history...";
            const q = query(collection(db, "meals"), orderBy("timestamp", "desc"), limit(50));
            const snap = await getDocs(q);
            list.innerHTML = "";
            snap.forEach(documentSnapshot => {
                const d = documentSnapshot.data();
                const docId = documentSnapshot.id;
                
                const rawDate = d.displayDate || d.date || (d.timestamp ? d.timestamp.toDate().toLocaleDateString() : "Unknown");
                const cleanDate = formatDate(rawDate);
                const feederInfo = d.fedBy ? ` fed by ${d.fedBy}` : '';
                
                const colorClass = d.status === 'Ate' ? 'text-green-600' : (d.status === 'Skipped' ? 'text-red-600' : 'text-yellow-600');
                
                // *** REVISED HISTORY CARD LAYOUT ***
                // The main flex container handles both alignment and spacing.
                const card = `
                    <div class="border-b pb-2">
                        <div class="flex justify-between items-start font-bold">
                            <span>${cleanDate} - ${d.meal}<span class="text-xs text-gray-500 font-normal">${feederInfo}</span></span>
                            
                            <div class="flex items-center gap-2 text-right flex-shrink-0 ml-4">
                                <span class="${colorClass}">${(d.status || 'Unknown').toUpperCase()}</span>
                                <button onclick="deleteLogItem('${docId}')" class="text-red-500 hover:text-red-700 bg-transparent border-0 p-0 cursor-pointer" title="Delete record">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 italic mt-1 pr-10">${d.notes || ''}</p>
                    </div>
                `;
                list.innerHTML += card;
            });
        }

        window.exportData = async () => {
            const q = query(collection(db, "meals"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);
            let csv = "Date,Meal,Status,Fed By,Notes\n";
            querySnapshot.forEach((doc) => {
                const d = doc.data();
                const rawDate = d.displayDate || d.date || (d.timestamp ? d.timestamp.toDate().toLocaleDateString() : "Unknown");
                const cleanDate = formatDate(rawDate);
                const feeder = d.fedBy || "N/A";
                csv += `${cleanDate},${d.meal},${d.status},${feeder},"${(d.notes || "").replace(/"/g, '""')}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `porter_report.csv`);
            a.click();
        };
    </script>
</body>
</html>
